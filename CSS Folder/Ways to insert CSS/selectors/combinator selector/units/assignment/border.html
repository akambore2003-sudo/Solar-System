<!DOCTYPE html>
<html>
<head>
<style>
body{
    font-family:Arial,sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    background:#fff;
}

.container{
    width:900px;
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:80px;
}

/* Hemisphere */
.hemisphere{
    width:250px;
    height:120px;
    border:15px solid lightgreen;
    border-bottom:none;
    border-radius:180px 180px 0 0;
    box-shadow:
        inset 12px 0 0 green,
        inset -12px 0 0 green;
    text-align:center;
    line-height:110px;
    font-weight:bold;
}

/* Round Rectangle */
.round{
    width:220px;
    height:90px;
    border-left:5px solid violet;
    border-right:5px solid violet;
    border-radius:50px;
    position:relative;
    text-align:center;
    line-height:90px;
    font-weight:bold;
}

.round::before,
.round::after{
    content:"";
    position:absolute;
    width:100%;
    height:100%;
    border-left:4px solid violet;
    border-right:4px solid violet;
    border-radius:50px;
    top:0;
}

.round::before{left:-10px;}
.round::after{left:10px;}

/* Bullet */
.bullet{
    width:250px;
    height:120px;
    border:8px solid lightgreen;
    border-left:12px solid pink;
    border-bottom:10px solid deepskyblue;
    border-radius:0 70px 70px 0;
    box-shadow:6px -6px 0 lightgreen;
    text-align:center;
    line-height:120px;
    font-weight:bold;
}

/* Leaf */
.leaf{
    width:250px;
    height:120px;
    background:#9acd32;
    border-radius:0 100px 0 100px;
    border-left:18px solid pink;
    border-right:18px solid deepskyblue;
    position:relative;
    text-align:center;
    line-height:120px;
    font-weight:bold;
}

.leaf::before{
    content:"";
    position:absolute;
    left:-18px;
    bottom:-18px;
    width:100%;
    height:100%;
    border-radius:0 100px 0 100px;
    border-bottom:10px solid hotpink;
}
</style>
</head>

<body>

<div class="container">

<div class="hemisphere">
Advanced Hemisphere
</div>

<div class="round">
Advanced Round Rectangle
</div>

<div class="bullet">
Advanced Bullet
</div>

<div class="leaf">
Advanced Leaf
</div>

</div>

</body>
</html>
