<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animal Gallery</title>
    <link rel="stylesheet" href="style.css">
    <style>
        *{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#f5f5f5;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    font-family:Arial,sans-serif;
}

.gallery{
    width:1200px;
    display:grid;
    grid-template-columns:1fr 2fr 1fr;
    grid-template-rows:220px 220px 220px;
    gap:5px;
    position:relative;
}

.box{
    overflow:hidden;
}

.box img{
    width:100%;
    height:100%;
    object-fit:cover;
    display:block;
}

.jelly{
    grid-column:1;
    grid-row:1/3;
}

.fish{
    grid-column:2;
    grid-row:1;
}

.parrot{
    grid-column:3;
    grid-row:1;
    height:105px;
}

.squirrel{
    grid-column:3;
    grid-row:1;
    margin-top:110px;
    height:105px;
}

.cat{
    grid-column:1;
    grid-row:3;
    height:105px;
}

.deer{
    grid-column:1;
    grid-row:3;
    margin-top:110px;
    height:105px;
}

.bird{
    grid-column:2;
    grid-row:2/4;
}

.panda{
    grid-column:3;
    grid-row:2/4;
}

.frog{
    grid-column:3;
    grid-row:3;
    
}

.circle{
    position:absolute;
    width:140px;
    height:140px;
    border-radius:50%;
    overflow:hidden;
    border:5px solid #fff;
    left:50%;
    top:50%;
    transform:translate(-50%,-50%);
    z-index:10;
}

.circle img{
    width:100%;
    height:100%;
    object-fit:cover;
}
    </style>
</head>
