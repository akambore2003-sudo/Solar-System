<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
     <title>CSS Position</title>

    <style>

        .main{
            width:800px;
            height:450px;
            border:4px solid brown;
            background:#f7f9f8;
            margin:50px auto;
            position:relative;
        }

        .child{
            width:180px;
            height:100px;
            background:orange;
            position:absolute;
            padding:10px;
        }
        </style>
        </head>

<body>

    <div class="main">

    <div class="child" style="top:0; left:0;">
        Child 1
    </div>

    <div class="child" style="top:150px; right:-20px;">
        Child 2
        </div>

    <div class="child" style="bottom:10px; left:10px;">
        Child 3
    </div>

</div>
   
</body>
</html>
